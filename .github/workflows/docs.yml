# docs — regenerate the command reference and deploy the MkDocs site on pushes to main
# that touch the docs or the command tree.
name: Docs

on:
  push:
    branches: [main]
    paths: [docs/**, mkdocs.yml, commands/**]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - run: go run ./tools/gendocs
      - uses: actions/setup-python@v6
        with:
          python-version: "3.x"
      - run: pip install mkdocs-material
      - run: mkdocs gh-deploy --force
